<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lena Perrier — Resume</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,800;1,9..40,400&family=Outfit:wght@600;700;800&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_back,download" />

  <!-- Styles -->
  <link rel="stylesheet" href="fonts.css" />
  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="nav.css" />

  <style>
    .resume-page {
      background: var(--color-surface);
      min-height: 100vh;
      padding-top: calc(var(--sp-12) + 48px);
      padding-bottom: var(--sp-12);
      padding-inline: var(--layout-pad-x);
    }

    .resume-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 810px;
      margin: 0 auto var(--sp-5);
    }

    .resume-header__title {
      font-family: var(--font-body);
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
      color: var(--color-text-primary);
      margin: 0;
    }

    .resume-header__download {
      display: inline-flex;
      align-items: center;
      gap: var(--sp-1);
      font-family: var(--font-body);
      font-size: var(--text-base);
      font-weight: var(--weight-medium);
      color: var(--color-text-primary);
      text-decoration: none;
      padding: 8px 16px;
      border: 1px solid var(--color-border-mid);
      border-radius: 8px;
      transition: background var(--transition-fast);
    }

    .resume-header__download:hover {
      background: rgba(0, 0, 0, 0.04);
      text-decoration: none;
    }

    .resume-header__download .material-symbols-outlined {
      font-size: 20px;
    }

    .resume-embed {
      max-width: 810px;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.10);
    }

    .resume-embed iframe {
      width: 810px;
      height: 1140px;
      border: none;
      display: block;
      background: #FFFFFF;
      transform-origin: top left;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav nav--scrolled" aria-label="Main navigation">
    <div class="nav__inner">
      <a href="./index.html" class="nav-btn nav-btn--home nav-btn--text" onclick="history.back(); return false;" aria-label="Go back">
        <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
        <span class="nav-btn__label">Back</span>
      </a>
      <div class="nav__right">
        <a href="./index.html#works" class="nav-btn nav-btn--text">Works</a>
        <a href="./about.html" class="nav-btn nav-btn--text">Me</a>
        <span class="nav-btn nav-btn--resume nav-btn--active">Resume</span>
      </div>
    </div>
  </nav>

  <main class="resume-page">
    <div class="resume-header">
      <h1 class="resume-header__title">My Resume</h1>
      <a href="./cv/cv.pdf" target="_blank" rel="noopener" class="resume-header__download">
        <span class="material-symbols-outlined" aria-hidden="true">download</span>
        Download PDF
      </a>
    </div>
    <div class="resume-embed">
      <iframe src="./cv/cv.html" title="Lena Perrier Resume"></iframe>
    </div>
  </main>

  <script>
  (function () {
    var wrap = document.querySelector('.resume-embed');
    var iframe = wrap.querySelector('iframe');
    var BASE_W = 810;
    var BASE_H = 1140;

    function scale() {
      var available = wrap.clientWidth;
      if (available >= BASE_W) {
        iframe.style.transform = '';
        wrap.style.height = '';
      } else {
        var s = available / BASE_W;
        iframe.style.transform = 'scale(' + s + ')';
        wrap.style.height = (BASE_H * s) + 'px';
      }
    }

    scale();
    window.addEventListener('resize', scale);
  })();
  </script>
</body>
</html>
